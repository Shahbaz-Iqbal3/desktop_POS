appId: com.pos.app
productName: POS App
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,package-lock.json,yarn.lock,bun.lock}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
  - '**/*.{node,dll}'
afterSign: build/notarize.js
# --- Windows code signing ---
# electron-builder auto-signs the Windows build when these env vars are present:
#   CSC_LINK        -> path/URL to your Authenticode .pfx certificate
#   CSC_KEY_PASSWORD-> certificate password
# Leave them unset for unsigned local builds.
win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  shortcutName: ${productName}
mac:
  target:
    - dmg
  artifactName: ${productName}-${version}.${ext}
linux:
  target:
    - AppImage
  artifactName: ${productName}-${version}.${ext}
# --- Auto-update publishing (GitHub Releases) ---
# Owner/repo are read from env so the same config works across forks/CI.
# Set GH_OWNER and GH_REPO before running `npm run package`. Leave them unset to
# skip publishing (the installer is still built locally).
publish:
  provider: github
  owner: ${env.GH_OWNER}
  repo: ${env.GH_REPO}
  releaseType: release
