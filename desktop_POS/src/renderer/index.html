<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/electron-vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POS App</title>
    <script>
      (function () {
        try {
          if (localStorage.getItem('pos-theme') === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          /* localStorage unavailable — fall back to default (light) theme */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
